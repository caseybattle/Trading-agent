AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'KXBTC Trading Bot Cloud Infrastructure'

Parameters:
  DataBucketName:
    Type: String
    Default: kxbtc-trading-bot-data
    Description: S3 bucket name for shared data storage
  
  KalshiApiKeyId:
    Type: String
    NoEcho: true
    Description: Kalshi API key ID from .env
  
  KalshiPrivateKeyPath:
    Type: String
    NoEcho: true
    Description: Path to private key file in Secrets Manager

Globals:
  Function:
    Timeout: 300
    MemorySize: 512
    Runtime: python3.11
    Environment:
      Variables:
        DATA_BUCKET: !Sub '${DataBucket}'
        KALSHI_API_KEY_ID: !Sub '${KalshiApiKeyId}'

Resources:
  # S3 Bucket for Shared Data
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${DataBucketName}-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Lambda Layer for Dependencies
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: kxbtc-dependencies
      ContentUri: dependencies
      CompatibleRuntimes:
        - python3.11

  # IAM Role for Lambda Functions
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 's3:GetObject'
                  - 's3:PutObject'
                  - 's3:DeleteObject'
                Resource: !Sub '${DataBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - 's3:ListBucket'
                Resource: !GetAtt DataBucket.Arn
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'secretsmanager:GetSecretValue'
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:kalshi/*'

  # IAM Role for EventBridge to invoke Lambda
  EventBridgeInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'lambda:InvokeFunction'
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:kxbtc-*'

  # Lambda Functions
  TraderLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: kxbtc-morning-scan
      CodeUri: ../scripts
      Handler: lambda_handler.handle_morning_scan
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref DependenciesLayer
      Environment:
        Variables:
          TASK_NAME: morning_scan

  MonitorLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: kxbtc-active-monitor
      CodeUri: ../scripts
      Handler: lambda_handler.handle_active_monitor
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref DependenciesLayer
      Environment:
        Variables:
          TASK_NAME: active_monitor

  ExpiryLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: kxbtc-expiry-intensive
      CodeUri: ../scripts
      Handler: lambda_handler.handle_expiry_intensive
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref DependenciesLayer
      Environment:
        Variables:
          TASK_NAME: expiry_intensive

  ResolverLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: kxbtc-auto-resolver
      CodeUri: ../scripts
      Handler: lambda_handler.handle_auto_resolve
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref DependenciesLayer
      Environment:
        Variables:
          TASK_NAME: auto_resolver

  OptimizerLambda:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: kxbtc-optimizer
      CodeUri: ../scripts
      Handler: lambda_handler.handle_optimizer
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref DependenciesLayer
      Environment:
        Variables:
          TASK_NAME: optimizer

  # EventBridge Rules
  MorningScanRule:
    Type: AWS::Events::Rule
    Properties:
      Name: kxbtc-morning-scan
      Description: Daily 9 AM EST morning scan
      ScheduleExpression: 'cron(0 14 * * ? *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt TraderLambda.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  ActiveMonitorRule:
    Type: AWS::Events::Rule
    Properties:
      Name: kxbtc-active-monitor
      Description: Every 30 min, 11 AM-9 PM EST
      ScheduleExpression: 'rate(30 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt MonitorLambda.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  ExpiryIntensiveRule:
    Type: AWS::Events::Rule
    Properties:
      Name: kxbtc-expiry-intensive
      Description: Every 15 min, 1-6 PM EST
      ScheduleExpression: 'rate(15 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt ExpiryLambda.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  AutoResolverRule:
    Type: AWS::Events::Rule
    Properties:
      Name: kxbtc-auto-resolver
      Description: Every 30 min, 9 AM-10 PM
      ScheduleExpression: 'rate(30 minutes)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt ResolverLambda.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  OptimizerRule:
    Type: AWS::Events::Rule
    Properties:
      Name: kxbtc-optimizer
      Description: Daily 10 PM EST
      ScheduleExpression: 'cron(0 3 * * ? *)'
      State: ENABLED
      Targets:
        - Arn: !GetAtt OptimizerLambda.Arn
          RoleArn: !GetAtt EventBridgeInvokeRole.Arn

  # Lambda Permissions for EventBridge
  TraderLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TraderLambda
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !GetAtt MorningScanRule.Arn

  MonitorLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MonitorLambda
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ActiveMonitorRule.Arn

  ExpiryLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExpiryLambda
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ExpiryIntensiveRule.Arn

  ResolverLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResolverLambda
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AutoResolverRule.Arn

  OptimizerLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OptimizerLambda
      Action: 'lambda:InvokeFunction'
      Principal: events.amazonaws.com
      SourceArn: !GetAtt OptimizerRule.Arn

Outputs:
  DataBucketName:
    Description: S3 bucket for shared data storage
    Value: !Ref DataBucket
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'

  TraderLambdaArn:
    Description: Morning scan Lambda ARN
    Value: !GetAtt TraderLambda.Arn

  OptimizerLambdaArn:
    Description: Optimizer Lambda ARN
    Value: !GetAtt OptimizerLambda.Arn
