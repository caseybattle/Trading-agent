# Shared setup steps referenced by all trading bot workflows.
# This file is documentation only — GitHub Actions does not support includes.
# Each workflow duplicates the setup steps below.
#
# Required GitHub Secrets:
#   KALSHI_API_KEY_ID              — Kalshi API key ID
#   KALSHI_PRIVATE_KEY_CONTENTS    — PEM key (newlines as \n)
#   AWS_ACCESS_KEY_ID              — AWS credentials for S3
#   AWS_SECRET_ACCESS_KEY          — AWS credentials for S3
#   AWS_DEFAULT_REGION             — e.g. us-east-1
#   AWS_S3_BUCKET                  — S3 bucket name for persistent data
#
# Optional:
#   KALSHI_USE_DEMO                — set to "true" for paper trading
#   BANKROLL                       — starting bankroll in USD (default 10)
