name: Kalshi BTC Expiry Intensive

# Runs every 15 minutes between 1:00 PM and 6:59 PM EDT
# EDT window: 1:00 PM–6:59 PM = 17:00–22:59 UTC
on:
  schedule:
    - cron: '0,15,30,45 17-22 * * *'
  workflow_dispatch:

jobs:
  expiry-intensive:
    name: Expiry Intensive Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run expiry-intensive scan
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_CONTENTS: ${{ secrets.KALSHI_PRIVATE_KEY_CONTENTS }}
          KALSHI_USE_DEMO: ${{ secrets.KALSHI_USE_DEMO || 'false' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          BANKROLL: ${{ secrets.BANKROLL || '10' }}
        run: |
          python scripts/kalshi_btc_trader.py \
            --once \
            --auto-trade \
            --bankroll "$BANKROLL"
