name: KXBTC Strategy Optimizer

# Runs nightly at 10:02 PM EDT (02:02 UTC)
# Nightly 5-specialist postmortem + strategy self-improvement after resolved trades
on:
  schedule:
    - cron: '2 2 * * *'
  workflow_dispatch:

jobs:
  strategy-optimizer:
    name: Nightly Strategy Optimizer
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run loss postmortem
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: python scripts/loss_postmortem.py

      - name: Run strategy optimizer
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: python scripts/strategy_optimizer.py
