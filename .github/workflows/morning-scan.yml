name: Kalshi BTC Morning Scan

# Runs daily at 9:08 AM EDT (13:08 UTC during EDT / 14:08 UTC during EST)
# Uses two schedules to handle EDT/EST switchover automatically.
on:
  schedule:
    - cron: '8 13 * * *'   # EDT (Mar–Nov)
    - cron: '8 14 * * *'   # EST (Nov–Mar)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  morning-scan:
    name: Morning Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning scan
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY_CONTENTS: ${{ secrets.KALSHI_PRIVATE_KEY_CONTENTS }}
          KALSHI_USE_DEMO: ${{ secrets.KALSHI_USE_DEMO || 'false' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          BANKROLL: ${{ secrets.BANKROLL || '10' }}
        run: |
          python scripts/kalshi_btc_trader.py \
            --once \
            --auto-trade \
            --bankroll "$BANKROLL"
